<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インスタ集客ロードマップ</title>
<style>
/* ============================================================
   デザイントークン（プレミアム刷新版）
   完全自己完結：CDN／外部フォント／外部画像 ゼロ。
   アイコンは絵文字、フォントは端末標準を使用。
   ============================================================ */
:root{
  --primary:#3b82f6;
  --primary-dark:#2563eb;
  --primary-light:#eff6ff;
  --accent:#f97316;
  --accent-dark:#ea580c;
  --accent-light:#fff7ed;
  --grad-primary:linear-gradient(135deg,#3b82f6,#2563eb);
  --grad-accent:linear-gradient(135deg,#fb923c,#f97316 55%,#ea580c);
  --grad-rail:linear-gradient(180deg,#3b82f6,#6366f1 45%,#f97316);
  --grad-green:linear-gradient(135deg,#22c55e,#16a34a);
  --bg:#eef1f6;
  --card:#ffffff;
  --text:#0f172a;
  --text-mid:#334155;
  --text-sub:#475569;
  --text-mute:#64748b;
  --line:#e2e8f0;
  --radius:20px;
  --radius-sm:14px;
  --shadow-soft:0 1px 3px rgba(15,23,42,.06);
  --shadow-card:0 1px 2px rgba(15,23,42,.04), 0 10px 24px -10px rgba(15,23,42,.14), 0 28px 50px -28px rgba(15,23,42,.20);
  --shadow-hero:0 8px 22px -4px rgba(249,115,22,.5), 0 4px 10px -3px rgba(234,88,12,.35);
  --font:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;
  --ease:cubic-bezier(.34,1.56,.64,1);
}

*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
body{
  font-family:var(--font);
  color:var(--text);
  line-height:1.8;
  overflow-wrap:anywhere;
  min-height:100vh;
  background:
    radial-gradient(1200px 620px at 82% -12%, rgba(59,130,246,.12), transparent 60%),
    radial-gradient(900px 520px at -12% 112%, rgba(249,115,22,.10), transparent 55%),
    var(--bg);
  background-attachment:fixed;
}
button{ font-family:inherit; cursor:pointer; border:none; background:none; -webkit-tap-highlight-color:transparent; }
:focus-visible{ outline:3px solid rgba(59,130,246,.55); outline-offset:2px; border-radius:6px; }
a{ color:var(--primary-dark); }

/* スクリーンリーダー専用（視覚的に隠す）ライブ領域 */
.sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

.wrap{ max-width:1060px; margin:0 auto; padding:0 16px; }

/* ===== ヘッダー（進捗バー付き・sticky） ===== */
.app-header{
  position:sticky; top:0; z-index:50;
  background:var(--grad-primary);
  color:#fff;
  box-shadow:0 6px 24px -8px rgba(37,99,235,.55);
}
.app-header::after{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(600px 120px at 85% -40%, rgba(255,255,255,.25), transparent 70%);
}
.app-header .wrap{ position:relative; z-index:1; padding-top:15px; padding-bottom:16px; }
.app-title{ display:flex; align-items:center; gap:10px; font-size:1.32rem; font-weight:800; letter-spacing:-.01em; }
.app-title .logo{ font-size:1.55rem; filter:drop-shadow(0 2px 4px rgba(0,0,0,.2)); }
.overall-progress{ display:flex; align-items:center; gap:13px; margin-top:14px; }
.overall-bar{
  flex:1; height:13px; background:rgba(255,255,255,.25); border-radius:999px; overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.18);
}
.overall-fill{
  position:relative; height:100%; width:0%; border-radius:999px; overflow:hidden;
  background:linear-gradient(90deg,#ffffff,#dbeafe);
  transition:width .75s var(--ease), background .4s;
}
.overall-fill::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(100deg,transparent, rgba(255,255,255,.75), transparent);
  transform:translateX(-100%); animation:shimmer 2.6s ease-in-out infinite;
}
.overall-fill.is-full{ background:var(--grad-accent); box-shadow:0 0 14px rgba(249,115,22,.55); }
@keyframes shimmer{ 0%{ transform:translateX(-100%) } 60%,100%{ transform:translateX(220%) } }
.overall-pct{ font-weight:800; font-size:1.08rem; min-width:48px; text-align:right; }
.overall-count{ font-size:.76rem; color:rgba(255,255,255,.92); white-space:nowrap; }

/* ===== レイアウト（2カラム） ===== */
.layout{ display:grid; grid-template-columns:300px 1fr; gap:22px; align-items:start; padding:24px 0 64px; }

/* ===== サイド（タイムライン＋ボーナス） ===== */
.aside{ position:sticky; top:112px; display:flex; flex-direction:column; gap:15px; }
.aside-card{ background:var(--card); border:1px solid rgba(226,232,240,.85); border-radius:18px; padding:18px 15px; box-shadow:var(--shadow-soft); }
.aside-card h3{ font-size:.8rem; font-weight:800; color:var(--text-sub); letter-spacing:.04em; margin-bottom:13px; padding-left:4px; }

/* タイムライン：トラック＋進捗フィル＋ノード */
.timeline{ position:relative; }
.tl-rail{ position:absolute; z-index:0; left:26px; top:27px; bottom:27px; width:4px; transform:translateX(-50%); background:#e3e9f2; border-radius:999px; overflow:hidden; }
.tl-rail-fill{ position:absolute; left:0; top:0; width:100%; height:calc(var(--frac,0) * 100%); background:var(--grad-rail); border-radius:999px; transition:height .8s var(--ease); }
.tl-list{ position:relative; z-index:1; display:flex; flex-direction:column; }
.tl-node{
  position:relative; z-index:1; display:flex; align-items:center; gap:12px;
  width:100%; height:54px; padding:0 8px; border-radius:13px; text-align:left;
  transition:background .2s, transform .14s var(--ease);
}
.tl-node:not(:disabled):hover{ background:#f1f5f9; }
.tl-node:not(:disabled):active{ transform:scale(.985); }
.tl-circle{
  position:relative; z-index:2; flex-shrink:0; width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:800;
  background:#fff; border:2px solid var(--line); color:var(--text-mute);
  box-shadow:0 1px 2px rgba(15,23,42,.1); transition:all .35s var(--ease);
}
.tl-label{ display:flex; flex-direction:column; min-width:0; }
.tl-step{ font-size:.62rem; font-weight:800; letter-spacing:.08em; color:var(--text-mute); }
.tl-title{ font-size:.84rem; font-weight:700; color:var(--text); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.tl-node.is-current{ background:linear-gradient(135deg,#eff6ff,#e0edff); }
.tl-node.is-current .tl-step{ color:var(--primary-dark); }
.tl-node.is-current .tl-circle{ border-color:var(--primary); background:var(--grad-primary); color:#fff; box-shadow:0 0 0 4px rgba(59,130,246,.2), 0 5px 12px -3px rgba(37,99,235,.5); }
.tl-node.is-current .tl-circle::after{ content:''; position:absolute; inset:-3px; border-radius:50%; border:2px solid var(--primary); animation:pulseRing 1.9s var(--ease) infinite; }
.tl-node.is-done .tl-circle{ border-color:#16a34a; background:var(--grad-green); color:#fff; box-shadow:0 0 0 3px rgba(34,197,94,.16), 0 5px 13px -3px rgba(22,163,74,.45); }
.tl-node.is-done.is-current .tl-circle::after{ border-color:#22c55e; }
.tl-node.is-locked{ cursor:not-allowed; }
.tl-node.is-locked .tl-circle{ background:#f1f5f9; border-color:#e2e8f0; color:#9aa6b8; box-shadow:none; }
.tl-node.is-locked .tl-title,.tl-node.is-locked .tl-step{ color:#9aa6b8; }
.tl-node.just-unlocked .tl-circle{ animation:popIn .55s var(--ease); }
@keyframes pulseRing{ 0%{ transform:scale(1); opacity:.7 } 70%{ transform:scale(1.4); opacity:0 } 100%{ opacity:0 } }
@keyframes popIn{ 0%{ transform:scale(.35); opacity:0 } 60%{ transform:scale(1.14) } 100%{ transform:scale(1); opacity:1 } }

/* ボーナスボタン */
.igr-bonus-btn{
  display:flex; align-items:center; gap:11px; width:100%; text-align:left;
  padding:14px 15px; border-radius:15px; font-size:.92rem; font-weight:800;
  border:2px dashed #cbd5e1; background:#f8fafc; color:var(--text-mute);
  transition:transform .15s var(--ease), box-shadow .25s, background .3s, border-color .3s, color .3s;
}
.igr-bonus-btn .igr-bonus-ico{ font-size:1.4rem; line-height:1; }
.igr-bonus-btn .igr-bonus-label{ display:block; }
.igr-bonus-btn .igr-bonus-sub{ font-size:.69rem; font-weight:600; color:var(--text-mute); display:block; margin-top:2px; }
.igr-bonus-btn:active{ transform:scale(.98); }
.igr-bonus-btn.is-unlocked{
  border-style:solid; border-color:#fdba74;
  background:linear-gradient(135deg,#fff7ed,#ffedd5); color:var(--accent-dark);
  box-shadow:0 4px 14px -4px rgba(249,115,22,.4); cursor:pointer;
}
.igr-bonus-btn.is-unlocked .igr-bonus-sub{ color:var(--accent); }
.igr-bonus-btn.is-unlocked:hover{ transform:translateY(-2px); box-shadow:0 9px 22px -5px rgba(249,115,22,.5); }
.igr-bonus-btn.is-unlocked .igr-bonus-ico{ animation:bob 2.2s ease-in-out infinite; }
@keyframes bob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-3px) } }

.reset-link{
  display:inline-flex; align-items:center; gap:5px; color:var(--text-mute);
  font-size:.78rem; font-weight:700; padding:6px 6px; align-self:center; border-radius:8px;
  transition:color .2s, transform .12s;
}
.reset-link:hover{ color:var(--accent-dark); }
.reset-link:active{ transform:scale(.96); }

/* ===== 右：アクティブステップカード ===== */
.main-card{
  position:relative; background:var(--card); border:1px solid rgba(226,232,240,.85);
  border-radius:var(--radius); padding:30px 30px 28px; box-shadow:var(--shadow-card);
  min-height:62vh; overflow:hidden;
}
.main-card::before{ content:''; position:absolute; left:0; right:0; top:0; height:5px; background:var(--grad-primary); }
.main-card.is-complete-card::before{ background:var(--grad-accent); }
.main-card.step-enter{ animation:cardEnter .45s var(--ease); }
@keyframes cardEnter{ from{ opacity:0; transform:translateY(12px) } to{ opacity:1; transform:none } }

.done-banner{
  display:flex; align-items:center; gap:10px;
  background:linear-gradient(135deg,#fff7ed,#ffedd5); border:1px solid #fdba74;
  border-radius:15px; padding:15px 17px; margin-bottom:22px;
  color:var(--accent-dark); font-weight:800; font-size:.96rem;
  box-shadow:0 5px 16px -7px rgba(249,115,22,.45);
}

.step-head{ display:flex; align-items:center; gap:16px; margin:4px 0 14px; }
.step-emoji{
  flex-shrink:0; width:64px; height:64px; border-radius:18px;
  display:flex; align-items:center; justify-content:center; font-size:2.1rem;
  background:linear-gradient(135deg,#eff6ff,#dbeafe); border:1px solid #dbeafe;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 6px 14px -5px rgba(59,130,246,.4);
}
.step-badge{
  display:inline-flex; align-items:center; gap:6px; font-size:.7rem; font-weight:800; letter-spacing:.06em;
  color:var(--primary-dark); background:var(--primary-light); border:1px solid #dbeafe;
  padding:4px 11px; border-radius:999px;
}
.step-title{ font-size:1.4rem; font-weight:800; color:var(--text); line-height:1.3; margin-top:8px; }
.step-desc{ font-size:.96rem; color:var(--text-sub); margin-bottom:22px; line-height:1.9; }

.task-list{ display:flex; flex-direction:column; gap:11px; margin-bottom:24px; }
.task-row{
  position:relative; display:flex; align-items:center; gap:14px; cursor:pointer;
  background:#fff; border:1.5px solid var(--line); border-radius:15px; padding:15px 17px;
  transition:border-color .2s, background .25s, box-shadow .25s, transform .12s var(--ease);
}
.task-row:hover{ border-color:#bfdbfe; background:#f8fbff; box-shadow:0 5px 16px -8px rgba(59,130,246,.4); }
.task-row:active{ transform:scale(.994); }
.task-row.is-done{ background:linear-gradient(135deg,#f6faff,#eef5ff); border-color:#cfe0fb; }
.task-cb{ position:absolute; opacity:0; width:1px; height:1px; }
.task-box{
  flex-shrink:0; width:30px; height:30px; border:2px solid #cbd5e1; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  background:#fff; color:transparent; font-size:1.05rem; font-weight:800;
  transition:all .25s var(--ease);
}
.task-row:hover .task-box{ border-color:var(--primary); }
.task-cb:focus-visible + .task-box{ outline:3px solid rgba(59,130,246,.55); outline-offset:3px; }
.task-row.is-done .task-box{ background:var(--grad-primary); border-color:var(--primary); color:#fff; box-shadow:0 5px 12px -4px rgba(37,99,235,.55); }
.task-text{ font-size:.97rem; font-weight:600; color:var(--text-mid); line-height:1.55; }
.task-row.is-done .task-text{ color:#94a3b8; text-decoration:line-through; text-decoration-color:#cbd5e1; }
.task-row.just-checked{ animation:rowFlash .65s ease; }
.task-row.just-checked .task-box{ animation:boxPop .45s var(--ease); }
@keyframes rowFlash{ 0%{ background:#dbeafe; border-color:#93c5fd } 100%{} }
@keyframes boxPop{ 0%{ transform:scale(.5) } 55%{ transform:scale(1.18) } 100%{ transform:scale(1) } }

/* Tipボックス */
.igr-tip-box{
  position:relative; background:linear-gradient(135deg,#f0f7ff,#eef4ff); border:1px solid #dbeafe;
  border-radius:15px; padding:16px 18px 16px 22px; margin-bottom:26px; overflow:hidden;
}
.igr-tip-box::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--grad-primary); }
.igr-tip-head{ font-size:.93rem; font-weight:800; color:var(--primary-dark); margin-bottom:7px; }
.igr-tip-body{ font-size:.89rem; color:var(--text-mid); line-height:1.85; }
.igr-tip-body .gem-link{
  display:inline-flex; align-items:center; gap:6px; margin-top:11px; padding:10px 16px;
  background:var(--grad-primary); color:#fff; border-radius:11px; font-weight:700; font-size:.87rem;
  text-decoration:none; box-shadow:0 5px 14px -5px rgba(37,99,235,.55);
  transition:transform .15s var(--ease), box-shadow .2s;
}
.igr-tip-body .gem-link:hover{ transform:translateY(-2px); box-shadow:0 9px 18px -5px rgba(37,99,235,.65); }
.igr-tip-body .gem-link:active{ transform:translateY(0) scale(.98); }

/* 次へ／完了ボタン（ヒーロー） */
.next-btn{
  position:relative; width:100%; padding:17px; border-radius:15px; font-size:1.05rem; font-weight:800;
  letter-spacing:.01em; background:#eaeef3; color:#9aa3b2; overflow:hidden;
  transition:transform .15s var(--ease), box-shadow .25s, background .3s, color .3s;
}
.next-btn:disabled{ cursor:not-allowed; }
.next-btn.is-ready{
  background:var(--grad-accent); color:#fff; box-shadow:var(--shadow-hero); cursor:pointer;
  animation:heroPulse 2.6s ease-in-out infinite;
}
.next-btn.is-ready::after{
  content:''; position:absolute; top:0; left:0; width:55%; height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);
  transform:translateX(-170%); animation:heroShimmer 2.9s ease-in-out infinite;
}
.next-btn.is-ready:hover{ transform:translateY(-2px); box-shadow:0 13px 28px -6px rgba(249,115,22,.6); }
.next-btn.is-ready:active{ transform:translateY(0) scale(.975); }
.next-btn.is-complete{ background:var(--grad-green); color:#fff; box-shadow:0 8px 20px -6px rgba(22,163,74,.55); cursor:default; }
@keyframes heroPulse{ 0%,100%{ box-shadow:0 8px 20px -4px rgba(249,115,22,.45) } 50%{ box-shadow:0 11px 30px -2px rgba(249,115,22,.72) } }
@keyframes heroShimmer{ 0%{ transform:translateX(-170%) } 60%,100%{ transform:translateX(290%) } }
.next-hint{ text-align:center; font-size:.84rem; color:var(--text-sub); margin-top:14px; font-weight:600; }

/* ===== トースト ===== */
.igr-toast-container{ position:fixed; bottom:20px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:9px; }
.igr-toast{
  background:rgba(15,23,42,.96); color:#fff; padding:14px 19px; border-radius:14px; font-size:.87rem; font-weight:700;
  box-shadow:0 14px 32px -10px rgba(0,0,0,.45); max-width:340px; line-height:1.6;
  animation:toastIn .35s var(--ease), toastOut .4s ease 2.7s forwards;
}
.igr-toast.success{ background:linear-gradient(135deg,#fb923c,#ea580c); box-shadow:0 14px 32px -10px rgba(234,88,12,.55); }
@keyframes toastIn{ from{ opacity:0; transform:translateX(40px) scale(.9) } to{ opacity:1; transform:none } }
@keyframes toastOut{ to{ opacity:0; transform:translateX(40px) } }

/* ===== 紙吹雪 ===== */
#confetti-canvas{ position:fixed; inset:0; z-index:1500; pointer-events:none; }

/* ===== ボーナスモーダル ===== */
.igr-modal-overlay{
  position:fixed; inset:0; background:rgba(15,23,42,.6); z-index:1800;
  display:none; align-items:center; justify-content:center; padding:20px;
  -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
}
.igr-modal-overlay.open{ display:flex; animation:overlayIn .25s ease; }
@keyframes overlayIn{ from{ opacity:0 } to{ opacity:1 } }
.igr-modal{
  display:block; position:relative; background:#fff; border-radius:22px; max-width:560px; width:100%;
  padding:30px 28px 26px; box-shadow:0 32px 72px -22px rgba(0,0,0,.5); max-height:88vh; overflow:auto;
  animation:modalIn .35s var(--ease);
}
.igr-modal::before{ content:''; position:absolute; left:0; right:0; top:0; height:5px; border-radius:22px 22px 0 0; background:var(--grad-accent); }
@keyframes modalIn{ from{ opacity:0; transform:translateY(20px) scale(.96) } to{ opacity:1; transform:none } }
.igr-modal-head{ display:flex; align-items:center; gap:10px; margin-bottom:7px; }
.igr-modal-title{ font-size:1.25rem; font-weight:800; color:var(--text); }
.igr-modal-desc{ font-size:.87rem; color:var(--text-sub); margin-bottom:18px; line-height:1.8; }
.igr-bonus-card{
  position:relative; background:linear-gradient(135deg,#fff7ed,#ffedd5); border:1px solid #fed7aa;
  border-radius:15px; padding:16px 18px; margin-bottom:13px; box-shadow:0 5px 14px -9px rgba(249,115,22,.5);
  transition:transform .15s var(--ease);
}
.igr-bonus-card:hover{ transform:translateY(-2px); }
.igr-bonus-card .igr-bt{ font-size:1.02rem; font-weight:800; color:var(--accent-dark); line-height:1.5; }
.igr-bonus-card .igr-bg-target{ font-size:.81rem; color:#9a3412; margin-top:7px; }
.igr-bonus-card .igr-bg-target b{ color:#7c2d12; }
.igr-modal-close{
  display:block; width:100%; margin-top:10px; padding:14px; border-radius:13px;
  background:var(--text); color:#fff; font-size:.93rem; font-weight:800;
  transition:transform .14s var(--ease), background .2s;
}
.igr-modal-close:hover{ background:#1e293b; }
.igr-modal-close:active{ transform:scale(.98); }

/* ===== フッター ===== */
.app-footer{ text-align:center; font-size:.77rem; color:var(--text-sub); padding:10px 16px 40px; line-height:1.9; }
.app-footer .igr-note{ color:#92400e; background:#fffbeb; border:1px solid #fde68a; border-radius:11px; padding:9px 15px; display:inline-block; margin-bottom:11px; font-weight:600; }

/* ===== レスポンシブ（スマホ：1カラム＋横スクロールタイムライン。PCは>=861pxで不変） ===== */
@media (max-width:860px){
  .wrap{ padding:0 14px; }
  main.wrap{ overflow-x:hidden; }            /* 本文側の横はみ出しを抑止（ヘッダーstickyには非干渉） */
  .layout{ grid-template-columns:1fr; gap:14px; padding:16px 0 52px; }
  .aside{ position:static; top:auto; gap:13px; }
  .aside-card{ padding:15px 13px; }

  /* ヘッダー進捗：%とカウントを上段・バーを下段全幅に（窮屈さ解消） */
  .app-header .wrap{ padding-top:13px; padding-bottom:14px; }
  .overall-progress{ flex-wrap:wrap; gap:7px 10px; margin-top:12px; }
  .overall-pct{ order:1; min-width:auto; font-size:1rem; }
  .overall-count{ order:2; margin-left:auto; }
  .overall-bar{ order:3; flex:1 1 100%; height:12px; }

  /* 横スクロールタイムライン（端の次ノードが覗いて横移動を示唆／スクロールバー非表示） */
  .timeline{ overflow-x:auto; overflow-y:hidden; padding:2px 2px 8px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .timeline::-webkit-scrollbar{ display:none; }
  .tl-rail{ left:46px; right:46px; top:29px; bottom:auto; width:auto; height:4px; transform:translateY(-50%); }
  .tl-rail-fill{ width:calc(var(--frac,0) * 100%); height:100%; transition:width .8s var(--ease); }
  .tl-list{ flex-direction:row; min-width:max-content; gap:2px; }
  .tl-node{ height:auto; flex-direction:column; align-items:center; justify-content:flex-start; min-width:92px; text-align:center; gap:7px; padding:8px 6px; border-radius:14px; }
  .tl-circle{ width:42px; height:42px; font-size:1.05rem; }
  .tl-label{ align-items:center; }
  .tl-step{ font-size:.6rem; }
  .tl-title{ white-space:normal; font-size:.74rem; line-height:1.25; }

// ボーナス（Step3クリアで解放）— 金額の言い切りは避ける
const bonusTitles = [
  {t:"9割が知らない！〇〇のかんたん裏ワザ", target:"AIの便利な使い方・ツール紹介"},
  {t:"知らないと損する！初心者がまずやるべき〇〇", target:"物販のはじめ方・おすすめ"},
  {t:"今すぐやめて！やりがちなNG行動3選", target:"マインドやノウハウ全般"}
];

/* ============================================================
   状態・永続化（ロジックは不変）
   ============================================================ */
var STORAGE_KEY = 'insta_roadmap_v3';
var TOTAL = appData.reduce(function(n,s){ return n + s.tasks.length; }, 0);
var BONUS_STEP_INDEX = 2; // Step3（0始まり）

var state = { completed:[], current:0, unlocked:[0], done:false };

function load(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    var saved = JSON.parse(raw);
    if(!saved || typeof saved !== 'object') return;

    // appData から有効な task id 集合を作る
    var validIds = {};
    appData.forEach(function(s){ s.tasks.forEach(function(t){ validIds[t.id] = true; }); });

    // completed: 実在 id のみ + 重複排除
    var comp = Array.isArray(saved.completed) ? saved.completed : [];
    var seen = {};
    state.completed = comp.filter(function(id){
      if(validIds[id] && !seen[id]){ seen[id] = true; return true; }
      return false;
    });

    // unlocked: 有効値(0..len-1 と 'bonus')に正規化 + 重複排除 + 0必須
    var rawUnlocked = Array.isArray(saved.unlocked) ? saved.unlocked : [0];
    var uSeen = {}, unlocked = [];
    rawUnlocked.forEach(function(v){
      var key = String(v);
      if(uSeen[key]) return;
      if(v === 'bonus'){ uSeen[key] = true; unlocked.push('bonus'); }
      else if(typeof v === 'number' && Math.floor(v) === v && v >= 0 && v < appData.length){ uSeen[key] = true; unlocked.push(v); }
    });
    if(unlocked.indexOf(0) < 0) unlocked.push(0);
    state.unlocked = unlocked;

    // current: unlocked に無ければ unlocked 内の最大の数値ステップ(無ければ0)に補正
    var cur = (typeof saved.current === 'number') ? saved.current : 0;
    if(state.unlocked.indexOf(cur) < 0){
      var maxStep = 0;
      state.unlocked.forEach(function(v){ if(typeof v === 'number' && v > maxStep) maxStep = v; });
      cur = maxStep;
    }
    if(cur < 0 || cur >= appData.length) cur = 0;
    state.current = cur;

    // done: 最終ステップが未完なら false に補正（バナー/ボタンの不整合解消）
    state.done = !!saved.done;
    if(state.done && !isStepComplete(appData.length - 1)) state.done = false;
  }catch(e){ /* 壊れた保存は無視して初期状態 */ }
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}

function isStepComplete(i){
  return appData[i].tasks.every(function(t){ return state.completed.indexOf(t.id) >= 0; });
}

/* ============================================================
   ユーティリティ（フォーカス復帰 / スクリーンリーダー通知）
   ============================================================ */
// チェックのたびに全再描画するため、操作したチェックボックスへフォーカスを戻す
function restoreFocus(id){
  var safe = (window.CSS && CSS.escape) ? CSS.escape(id) : String(id).replace(/"/g, '\\"');
  var el = document.querySelector('.task-cb[data-id="' + safe + '"]');
  if(el) el.focus();
}
// 視覚的に隠した polite ライブ領域へ短い文だけ通知
function announce(msg){
  var el = document.getElementById('srStatus');
  if(el) el.textContent = msg;
}

/* ============================================================
   操作（ロジックは不変）
   ============================================================ */
function toggleTask(id){
  var idx = state.completed.indexOf(id);
  if(idx >= 0) state.completed.splice(idx, 1);
  else state.completed.push(id);

  // Step3 を終えたらボーナス解放（一度解放したら維持）
  if(isStepComplete(BONUS_STEP_INDEX) && state.unlocked.indexOf('bonus') < 0){
    state.unlocked.push('bonus');
    showToast('🍌 ボーナス解放！「ナノバナナで使えるタイトル案集」が見られるよ', 'success');
  }
  // 最終ステップが未完に戻ったら完了フラグを解除（バナー/ボタンの不整合解消）
  if(state.done && !isStepComplete(appData.length - 1)) state.done = false;

  save();
  render();
  restoreFocus(id);
  announce(Math.min(100, Math.round(state.completed.length / TOTAL * 100)) + 'パーセント、' + state.completed.length + '／' + TOTAL + ' 完了');
}

function goNext(){
  var step = appData[state.current];
  var allDone = step.tasks.every(function(t){ return state.completed.indexOf(t.id) >= 0; });
  if(!allDone){ showToast('まず、このステップを全部チェックしてね！'); return; }

  var isLast = state.current === appData.length - 1;
  if(isLast){
    if(!state.done){
      state.done = true;
      save();
      render();
      fireConfetti();
      showToast('🎉 全ステップ完了！本当におつかれさま。あなたなら続けられるよ！', 'success');
      announce('全ステップ完了しました。おめでとうございます');
    }
    return;
  }
  var next = state.current + 1;
  var wasUnlocked = state.unlocked.indexOf(next) >= 0;
  if(!wasUnlocked) state.unlocked.push(next);
  state.current = next;
  save();
  render();
  scrollToTop();
  // 新規解放時のみ「解放！」、既に解放済みなら「移動」
  if(wasUnlocked){ showToast('STEP ' + (next + 1) + ' へ移動したよ'); }
  else{ showToast('STEP ' + (next + 1) + ' を解放！この調子でいこう💪'); }
  announce('STEP ' + (next + 1) + ' に移動しました');
}

function goToStep(i){
  if(state.unlocked.indexOf(i) < 0){ showToast('🔒 ここはまだ解放されていないよ。前のステップから進めてね'); return; }
  state.current = i;
  save();
  render();
  scrollToTop();
  announce('STEP ' + (i + 1) + ' に移動しました');
}

function onBonusClick(){
  if(state.unlocked.indexOf('bonus') >= 0){ openBonus(); }
  else{ showToast('🔒 STEP3（画像投稿）をクリアで解放されるよ！'); }
}

function resetAll(){
  if(!confirm('本当に最初からやり直しますか？\nチェックや進み具合がすべて消えます。')) return;
  state = { completed:[], current:0, unlocked:[0], done:false };
  save();
  render();
  scrollToTop();
  showToast('最初からスタート！いつでも応援してるよ💪');
}

function scrollToTop(){
  try{ window.scrollTo({ top:0, behavior:'smooth' }); }
  catch(e){ window.scrollTo(0, 0); }
}

/* ============================================================
   描画
   ============================================================ */
function render(){
  renderTimeline();
  renderActiveStep();
  updateProgress();
  updateBonusButton();
}

// タイムライン：トラック＋進捗フィル＋ノード（状態演出・新規解放pop）
// モバイル横スクロール時、現在ステップのノードをタイムライン内で中央へ寄せる（ページ自体はスクロールしない）
function centerActiveNode(host, node){
  if(!host || !node) return;
  if(host.scrollWidth <= host.clientWidth + 4) return; // 横スクロール（モバイル）でなければ何もしない
  var target = node.offsetLeft - (host.clientWidth - node.offsetWidth) / 2;
  if(target < 0) target = 0;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  try{ host.scrollTo({ left: target, behavior: reduce ? 'auto' : 'smooth' }); }
  catch(e){ host.scrollLeft = target; }
}

var prevUnlockedSnapshot = [];
function renderTimeline(){
  var host = document.getElementById('timeline');
  host.textContent = '';

  // 進捗レール（薄いトラック＋色の伸びるフィル）
  var rail = document.createElement('div');
  rail.className = 'tl-rail';
  rail.setAttribute('aria-hidden', 'true');
  var railFill = document.createElement('div');
  railFill.className = 'tl-rail-fill';
  rail.appendChild(railFill);
  host.appendChild(rail);

  // どこまで到達したか（完了 or 現在地のいずれか深い方）
  var lastDone = -1;
  appData.forEach(function(s, i){ if(isStepComplete(i)) lastDone = i; });
  var progressIndex = Math.max(state.current, lastDone, 0);
  var frac = appData.length > 1 ? progressIndex / (appData.length - 1) : 0;
  if(frac < 0) frac = 0; if(frac > 1) frac = 1;
  railFill.style.setProperty('--frac', frac);

  var list = document.createElement('div');
  list.className = 'tl-list';
  var activeNodeEl = null;

  appData.forEach(function(step, i){
    var done = isStepComplete(i);
    var unlocked = state.unlocked.indexOf(i) >= 0;

    var node = document.createElement('button');
    node.type = 'button';
    node.className = 'tl-node';
    if(i === state.current) node.classList.add('is-current');
    if(done) node.classList.add('is-done');
    if(!unlocked) node.classList.add('is-locked');
    if(i <= progressIndex) node.classList.add('is-reached');
    // 新規解放されたノードだけ pop（前回スナップショットに無く今回ある）
    if(unlocked && prevUnlockedSnapshot.indexOf(i) < 0) node.classList.add('just-unlocked');
    node.disabled = !unlocked;
    node.setAttribute('aria-current', i === state.current ? 'step' : 'false');
    if(i === state.current) activeNodeEl = node;

    var circle = document.createElement('span');
    circle.className = 'tl-circle';
    circle.setAttribute('aria-hidden', 'true');
    if(done) circle.textContent = '✓';
    else if(!unlocked) circle.textContent = '🔒';
    else circle.textContent = step.emoji;

    var label = document.createElement('span');
    label.className = 'tl-label';
    var sno = document.createElement('span');
    sno.className = 'tl-step';
    sno.textContent = 'STEP ' + step.step;
    var title = document.createElement('span');
    title.className = 'tl-title';
    title.textContent = step.short;
    label.appendChild(sno);
    label.appendChild(title);

    node.appendChild(circle);
    node.appendChild(label);
    node.addEventListener('click', function(){ goToStep(i); });
    list.appendChild(node);
  });

  host.appendChild(list);
  centerActiveNode(host, activeNodeEl);   // モバイル横タイムライン：現在地を可視化
  prevUnlockedSnapshot = state.unlocked.slice();
}

// アクティブステップ：プレミアムカード（バッジ/満足感のあるチェック/ヒーローボタン）
var prevCompletedSnapshot = [];
var lastRenderedStep = -1;
function renderActiveStep(){
  var step = appData[state.current];
  var host = document.getElementById('activeStep');

  var stepChanged = (lastRenderedStep !== state.current);
  lastRenderedStep = state.current;

  // 今回新たにチェックされたタスク（行フラッシュ用・トグル毎の全行再生を防ぐ）
  var newlyChecked = state.completed.filter(function(id){ return prevCompletedSnapshot.indexOf(id) < 0; });

  host.textContent = '';
  if(state.done) host.classList.add('is-complete-card'); else host.classList.remove('is-complete-card');

  var isLast = state.current === appData.length - 1;
  var allDone = step.tasks.every(function(t){ return state.completed.indexOf(t.id) >= 0; });

  // 完了バナー（全ステップ通過後）
  if(state.done){
    var banner = document.createElement('div');
    banner.className = 'done-banner';
    banner.textContent = '🎉 ロードマップ完了！ここからは「続けること」がいちばんの力になるよ。';
    host.appendChild(banner);
  }

  // ヘッダー（絵文字タイル＋STEPバッジ＋タイトル）
  var head = document.createElement('div');
  head.className = 'step-head';
  var emoji = document.createElement('span');
  emoji.className = 'step-emoji';
  emoji.setAttribute('aria-hidden', 'true');
  emoji.textContent = step.emoji;
  var htext = document.createElement('div');
  var badge = document.createElement('div');
  badge.className = 'step-badge';
  badge.textContent = 'STEP ' + step.step + ' / ' + appData.length;
  var stitle = document.createElement('h2');
  stitle.className = 'step-title';
  stitle.textContent = step.title;
  htext.appendChild(badge);
  htext.appendChild(stitle);
  head.appendChild(emoji);
  head.appendChild(htext);
  host.appendChild(head);

  // 説明
  var desc = document.createElement('p');
  desc.className = 'step-desc';
  desc.textContent = step.desc;
  host.appendChild(desc);

  // タスク一覧
  var list = document.createElement('div');
  list.className = 'task-list';
  step.tasks.forEach(function(task){
    var checked = state.completed.indexOf(task.id) >= 0;
    var row = document.createElement('label');
    row.className = 'task-row' + (checked ? ' is-done' : '') + (newlyChecked.indexOf(task.id) >= 0 ? ' just-checked' : '');
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'task-cb';
    cb.checked = checked;
    cb.setAttribute('data-id', task.id);
    cb.setAttribute('aria-label', task.text);
    cb.addEventListener('change', function(){ toggleTask(task.id); });
    var box = document.createElement('span');
    box.className = 'task-box';
    box.setAttribute('aria-hidden', 'true');
    box.textContent = '✓';
    var txt = document.createElement('span');
    txt.className = 'task-text';
    txt.textContent = task.text; // 安全のためtextContent
    row.appendChild(cb);
    row.appendChild(box);
    row.appendChild(txt);
    list.appendChild(row);
  });
  host.appendChild(list);

  // Tipボックス（tip.text のみ意図的にHTML許可：リンクを含むため）
  var tip = document.createElement('div');
  tip.className = 'igr-tip-box';
  var tiphead = document.createElement('div');
  tiphead.className = 'igr-tip-head';
  tiphead.textContent = step.tip.emoji + ' ' + step.tip.title;
  var tipbody = document.createElement('div');
  tipbody.className = 'igr-tip-body';
  tipbody.innerHTML = step.tip.text; // 静的データ。リンクを表示するためHTMLを許可
  tip.appendChild(tiphead);
  tip.appendChild(tipbody);
  host.appendChild(tip);

  // 次へ／完了ボタン（ヒーロー）
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'next-btn';
  if(isLast){
    if(state.done){
      btn.textContent = '🎉 ロードマップ完了！おつかれさま';
      btn.disabled = true;
      btn.classList.add('is-complete');
    }else{
      btn.textContent = '🎉 ロードマップを完了する';
      btn.disabled = !allDone;
      if(allDone) btn.classList.add('is-ready');
    }
  }else{
    btn.textContent = '次のステップへ進む →';
    btn.disabled = !allDone;
    if(allDone) btn.classList.add('is-ready');
  }
  btn.addEventListener('click', goNext);
  host.appendChild(btn);

  // 未完のときのヒント
  if(!allDone){
    var remaining = step.tasks.length - step.tasks.filter(function(t){ return state.completed.indexOf(t.id) >= 0; }).length;
    var hint = document.createElement('p');
    hint.className = 'next-hint';
    hint.textContent = 'あと ' + remaining + ' 個チェックすると、次に進めるよ！';
    host.appendChild(hint);
  }

  // 入場アニメ：ステップ切替時のみ（トグル毎の再生を避ける／reflowで再起動）
  host.classList.remove('step-enter');
  if(stepChanged){ void host.offsetWidth; host.classList.add('step-enter'); }

  prevCompletedSnapshot = state.completed.slice();
}

function updateProgress(){
  var done = state.completed.length;
  var pct = TOTAL ? Math.min(100, Math.round(done / TOTAL * 100)) : 0;
  var fill = document.getElementById('overallFill');
  fill.style.width = pct + '%';
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('overallCount').textContent = done + '/' + TOTAL + ' タスク完了';
  document.getElementById('overallProgress').setAttribute('aria-valuenow', pct);
  if(pct >= 100) fill.classList.add('is-full');
  else fill.classList.remove('is-full');
}

function updateBonusButton(){
  var btn = document.getElementById('bonusBtn');
  var unlocked = state.unlocked.indexOf('bonus') >= 0;
  var ico = btn.querySelector('.igr-bonus-ico');
  var label = btn.querySelector('.igr-bonus-label');
  var sub = btn.querySelector('.igr-bonus-sub');
  if(unlocked){
    btn.classList.add('is-unlocked');
    btn.classList.remove('is-locked');
    ico.textContent = '🍌';
    label.textContent = 'ボーナスを見る';
    sub.textContent = 'ナノバナナのタイトル案集';
  }else{
    btn.classList.add('is-locked');
    btn.classList.remove('is-unlocked');
    ico.textContent = '🔒';
    label.textContent = 'ボーナス（ロック中）';
    sub.textContent = 'STEP3クリアで解放';
  }
}

/* ============================================================
   ボーナスモーダル（ロジック不変）
   ============================================================ */
function buildBonusModal(){
  var host = document.getElementById('bonusList');
  host.textContent = '';
  bonusTitles.forEach(function(b){
    var card = document.createElement('div');
    card.className = 'igr-bonus-card';
    var t = document.createElement('div');
    t.className = 'igr-bt';
    t.textContent = '「' + b.t + '」';
    var tg = document.createElement('div');
    tg.className = 'igr-bg-target';
    var lbl = document.createElement('b');
    lbl.textContent = 'こんな発信に：';
    tg.appendChild(lbl);
    tg.appendChild(document.createTextNode(b.target));
    card.appendChild(t);
    card.appendChild(tg);
    host.appendChild(card);
  });
}
var lastFocusedBeforeModal = null;
// モーダル内のフォーカス可能要素（表示中のもの）
function getModalFocusables(){
  var modal = document.getElementById('bonusModal');
  var nodes = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  return Array.prototype.filter.call(nodes, function(el){
    return !el.disabled && el.offsetParent !== null;
  });
}
function openBonus(){
  lastFocusedBeforeModal = document.activeElement;
  document.getElementById('bonusModal').classList.add('open');
  var f = getModalFocusables();
  if(f.length) f[0].focus(); // 先頭フォーカス可能要素（とじるボタン）へ
}
function closeBonus(){
  var modal = document.getElementById('bonusModal');
  if(!modal.classList.contains('open')) return;
  modal.classList.remove('open');
  // 起動元へフォーカスを戻す
  if(lastFocusedBeforeModal && typeof lastFocusedBeforeModal.focus === 'function'){ lastFocusedBeforeModal.focus(); }
  else{ var b = document.getElementById('bonusBtn'); if(b) b.focus(); }
}
document.getElementById('bonusModal').addEventListener('click', function(e){
  if(e.target === this) closeBonus();
});
document.addEventListener('keydown', function(e){
  var modal = document.getElementById('bonusModal');
  if(!modal.classList.contains('open')) return;
  if(e.key === 'Escape'){ closeBonus(); return; }
  if(e.key === 'Tab'){
    // Tab をモーダル内にトラップ
    var f = getModalFocusables();
    if(!f.length){ e.preventDefault(); return; }
    var first = f[0], last = f[f.length - 1];
    if(e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }
});

/* ============================================================
   トースト
   ============================================================ */
function showToast(msg, type){
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'igr-toast' + (type ? ' ' + type : '');
  t.textContent = msg; // textContent＝XSS安全
  c.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 3300);
}

/* ============================================================
   紙吹雪（外部ライブラリ無し・Canvasで自前生成・祝い強化）
   ============================================================ */
function fireConfetti(){
  // 動き軽減設定なら紙吹雪を出さない
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches){ return; }
  var canvas = document.getElementById('confetti-canvas');
  var ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var colors = ['#3b82f6','#2563eb','#60a5fa','#f97316','#ea580c','#fb923c','#fbbf24','#34d399','#f472b6'];
  var pieces = [];
  var N = 200;
  for(var i = 0; i < N; i++){
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.5,
      w: 6 + Math.random() * 8,
      h: 8 + Math.random() * 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.35,
      vy: 2.2 + Math.random() * 4.2,
      vx: (Math.random() - 0.5) * 2.4,
      sway: Math.random() * Math.PI * 2,
      shape: Math.random() < 0.35 ? 'circle' : 'rect'
    });
  }
  var start = Date.now(), DURATION = 6000;
  function frame(){
    var elapsed = Date.now() - start;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var fade = elapsed > DURATION - 1200 ? Math.max(0, (DURATION - elapsed) / 1200) : 1;
    var active = false;
    for(var i = 0; i < pieces.length; i++){
      var p = pieces[i];
      p.vy += 0.03; // ゆるい重力
      p.y += p.vy;
      p.x += p.vx + Math.sin((p.y + p.sway) / 45) * 1.3;
      p.rot += p.vr;
      if(p.y < canvas.height + 40) active = true;
      ctx.save();
      ctx.globalAlpha = fade;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.shape === 'circle'){ ctx.beginPath(); ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2); ctx.fill(); }
      else{ ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); }
      ctx.restore();
    }
    if(active && elapsed < DURATION){ requestAnimationFrame(frame); }
    else{ ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  requestAnimationFrame(frame);
}

/* ============================================================
   起動
   ============================================================ */
load();
buildBonusModal();
prevCompletedSnapshot = state.completed.slice();   // 初回ロード分は「新規チェック」扱いにしない
prevUnlockedSnapshot = state.unlocked.slice();     // 初回ロード分は pop させない
render();
</script>
